<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閒人案內所 👻 | 頂級生活陪伴體驗</title>
    <!-- 引入高品質 Google 字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(102, 252, 241, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-cyan: #00f2fe;
            --accent-blue: #4facfe;
            --accent-purple: #bd00ff;
            --accent-pink: #ff007f;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --nav-bg: rgba(17, 24, 39, 0.85);
            --glow-color: rgba(0, 242, 254, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(189, 0, 255, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 242, 254, 0.08) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 頂部奢華標題 */
        header {
            text-align: center;
            padding: 4rem 1.5rem 1.5rem;
            width: 100%;
            max-width: 650px;
            position: relative;
        }

        .logo-area {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 15px var(--glow-color));
            animation: float 4s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.05); }
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            margin-bottom: 0.75rem;
            text-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 1px;
            transition: all 0.5s ease;
        }

        /* 頂級懸浮磨砂導覽列 */
        nav {
            display: flex;
            background-color: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 100px;
            padding: 6px;
            width: 92%;
            max-width: 520px;
            margin: 1.5rem auto 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #9ca3af;
            padding: 14px 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 100px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .tab-btn.active {
            color: #030712;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.4);
        }

        /* 內容容器 */
        .content-container {
            width: 92%;
            max-width: 620px;
            flex-grow: 1;
            margin-bottom: 4rem;
        }

        .tab-content {
            display: none;
            animation: cubic-bezier(0.16, 1, 0.3, 1) slideUp 0.6s forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* 質感邊框區塊標題 */
        .section-title {
            font-size: 1.05rem;
            color: var(--accent-cyan);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 2.2rem 0 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(0, 242, 254, 0.3), transparent);
        }

        /* 卡片清單與質感磨砂玻璃設計 */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        a.card-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--card-border);
            padding: 1.4rem;
            border-radius: 18px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        a.card-link:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: var(--accent-cyan);
            box-shadow: 
                0 15px 35px rgba(0, 242, 254, 0.15),
                0 0 15px rgba(0, 242, 254, 0.1);
        }

        .card-info {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .card-icon {
            font-size: 1.6rem;
            background: rgba(255, 255, 255, 0.03);
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }

        a.card-link:hover .card-icon {
            background: rgba(0, 242, 254, 0.1);
            border-color: rgba(0, 242, 254, 0.3);
            transform: rotate(-8deg);
        }

        .card-text h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tag {
            font-size: 0.7rem;
            background: linear-gradient(135deg, var(--accent-purple), #7b2cbf);
            color: #fff;
            padding: 2px 8px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .tag.hot {
            background: linear-gradient(135deg, var(--accent-pink), #ff0055);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }

        .card-text p {
            font-size: 0.88rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .arrow-icon {
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: all 0.4s ease;
        }

        a.card-link:hover .arrow-icon {
            color: var(--accent-cyan);
            transform: translateX(5px);
        }

        /* 雙欄一對一諮詢卡片 */
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        .contact-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 18px;
            padding: 1.8rem 1.2rem;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid var(--card-border);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .contact-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-cyan);
            box-shadow: 0 15px 35px rgba(0, 242, 254, 0.15);
        }

        .contact-card .avatar {
            font-size: 2.8rem;
            margin-bottom: 0.8rem;
            transition: all 0.4s ease;
            display: inline-block;
        }

        .contact-card:hover .avatar {
            transform: scale(1.15) rotate(5deg);
        }

        .contact-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .contact-card p {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* 密碼鎖定畫面 */
        .password-overlay {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1)
