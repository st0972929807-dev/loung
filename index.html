<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閒人案內所 👻 | 頂級生活陪伴體驗</title>
    <!-- 僅保留一個最核心的高質感字體，避免載入過多外部資源導致打不開 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.85); /* 提高不透明度，防止不支援 blur 的瀏覽器變透明 */
            --card-border: rgba(102, 252, 241, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-cyan: #00f2fe;
            --accent-blue: #4facfe;
            --accent-purple: #bd00ff;
            --accent-pink: #ff007f;
            --nav-bg: rgba(17, 24, 39, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            /* 簡化背景漸層，避免部分手機 GPU 渲染失敗導致黑屏 */
            background-image: radial-gradient(circle at 50% 10%, rgba(189, 0, 255, 0.08), transparent 60%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 3rem 1.5rem 1rem;
            width: 100%;
            max-width: 600px;
        }

        .logo-area {
            font-size: 3.5rem;
            margin-bottom: 0.8rem;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* 導覽列 */
        nav {
            display: flex;
            background-color: var(--nav-bg);
            border-radius: 50px;
            padding: 5px;
            width: 90%;
            max-width: 500px;
            margin: 1rem auto 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #9ca3af;
            padding: 12px 5px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            outline: none;
        }

        .tab-btn.active {
            color: #030712;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }

        .content-container {
            width: 90%;
            max-width: 600px;
            flex-grow: 1;
            margin-bottom: 3rem;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .section-title {
            font-size: 1rem;
            color: var(--accent-cyan);
            font-weight: 700;
            letter-spacing: 1px;
            margin: 2rem 0 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(0, 242, 254, 0.3), transparent);
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        a.card-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 1.2rem;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        a.card-link:hover {
            transform: translateY(-3px);
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.15);
        }

        .card-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card-icon {
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .card-text h3 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tag {
            font-size: 0.7rem;
            background: linear-gradient(135deg, var(--accent-purple), #7b2cbf);
            color: #fff;
            padding: 1px 6px;
            border-radius: 4px;
        }

        .tag.hot {
            background: linear-gradient(135deg, var(--accent-pink), #ff0055);
        }

        .card-text p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .arrow-icon {
            color: var(--text-muted);
            font-size: 1rem;
            transition: transform 0.3s;
        }

        a.card-link:hover .arrow-icon {
            color: var(--accent-cyan);
            transform: translateX(4px);
        }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .contact-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem 1rem;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid var(--card-border);
            transition: all 0.3s;
        }

        .contact-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.15);
        }

        .contact-card .avatar {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .contact-card h3 {
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .contact-card p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* 密碼驗證鎖定畫面 */
        .password-overlay {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 2.5rem 1.5rem;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .lock-icon {
            font-size: 3rem;
            color: var(--accent-cyan);
            margin-bottom: 0.8rem;
        }

        .password-overlay h2 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .password-overlay p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .password-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            max-width: 260px;
            margin: 0 auto;
        }

        .password-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 12px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 5px;
            outline: none;
        }

        .password-input:focus {
            border-color: var(--accent-cyan);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #030712;
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        .error-message {
            color: var(--accent-pink);
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }

        /* 房號 Grid 佈局 */
        .room-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 480px) {
            .room-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .room-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px 5px;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s;
        }

        .room-btn span {
            font-size: 0.6rem;
            color: var(--accent-cyan);
            margin-top: 2px;
        }

        .room-btn:hover {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #030712;
