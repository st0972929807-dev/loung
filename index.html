<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閒人案內所 👻 ｜ 頂級生活陪伴入口門戶</title>
    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- 引入 FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0b0c10;
            --bg-card: #1f2833;
            --neon-blue: #66fcf1;
            --neon-purple: #da22ff;
            --neon-pink: #ff007f;
            --text-main: #ffffff;
            --text-muted: #c5a880;
            --text-desc: #a5b1c2;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(102, 252, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(218, 34, 255, 0.05) 0%, transparent 40%);
        }

        /* 背景流光線條 */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.8;
        }

        /* 頂部 Header */
        header {
            text-align: center;
            padding: 3rem 1rem 1.5rem;
            position: relative;
        }

        .logo-area {
            position: relative;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            filter: blur(25px);
            opacity: 0.6;
            border-radius: 50%;
            animation: pulse 3s infinite;
        }

        .logo-icon {
            font-size: 3rem;
            position: relative;
            z-index: 1;
            animation: float 4s ease-in-out infinite;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 2px 10px rgba(102, 252, 241, 0.3));
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 500;
            opacity: 0.9;
        }

        /* 導覽 Tab */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem auto 3rem;
            max-width: 600px;
            padding: 0 1rem;
        }

        .tab-btn {
            background: rgba(31, 40, 51, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-desc);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab-btn:hover {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: #000;
            font-weight: 700;
            border-color: transparent;
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
        }

        /* 主容器 */
        main {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 0 1.5rem 5rem;
            flex-grow: 1;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        /* 區塊標題 */
        .section-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 2rem 0 1.25rem;
            padding-left: 0.5rem;
        }

        .section-title span {
            width: 4px;
            height: 24px;
            background: linear-gradient(to bottom, var(--neon-blue), var(--neon-purple));
            border-radius: 4px;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .section-title h2 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fff;
        }

        /* 卡片列表樣式 */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
        }

        @media (min-width: 600px) {
            .card-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .portal-card {
            background: linear-gradient(135deg, rgba(31, 40, 51, 0.8), rgba(20, 26, 33, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .portal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .portal-card:hover::before {
            transform: translateX(100%);
        }

        .portal-card:hover {
            transform: translateY(-4px);
            border-color: var(--neon-blue);
            box-shadow: 0 8px 25px rgba(102, 252, 241, 0.15);
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .card-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(102, 252, 241, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon-blue);
            font-size: 1.25rem;
            border: 1px solid rgba(102, 252, 241, 0.2);
            transition: var(--transition);
        }

        .portal-card:hover .card-icon {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .card-info h3 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge.hot {
            background: rgba(255, 0, 127, 0.2);
            color: var(--neon-pink);
            border: 1px solid rgba(255, 0, 127, 0.3);
        }

        .badge.admin {
            background: rgba(218, 34, 255, 0.2);
            color: var(--neon-purple);
            border: 1px solid rgba(218, 34, 255, 0.3);
        }

        .card-info p {
            font-size: 0.85rem;
            color: var(--text-desc);
        }

        .card-arrow {
            color: var(--text-desc);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .portal-card:hover .card-arrow {
            color: var(--neon-blue);
            transform: translateX(3px);
        }

        /* 專人諮詢聯絡區 (大卡片) */
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
            margin-top: 1rem;
        }

        @media (min-width: 600px) {
            .contact-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .contact-card {
            background: linear-gradient(135deg, rgba(31, 40, 51, 0.8), rgba(20, 26, 33, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .contact-card:hover {
            transform: translateY(-4px);
            border-color: var(--neon-purple);
            box-shadow: 0 8px 25px rgba(218, 34, 255, 0.15);
        }

        .contact-avatar {
            width: 60px;
