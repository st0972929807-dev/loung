<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閒人庵</title>
    <style>
        /* 基礎樣式重設與韓系、港風復古感極簡配色 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #121212; /* 深色沉穩背景 */
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 導覽列 */
        header {
            background-color: #1c1c1e;
            border-bottom: 1px solid #2c2c2e;
            padding: 10px 0;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            list-style: none;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #8e8e93;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }

        .tab-btn:hover {
            color: #ffffff;
        }

        .tab-btn.active {
            color: #ffffff;
            border-bottom: 2px solid #ffffff; /* 經典白線指示器 */
        }

        /* 內容容器 */
        .content-container {
            flex: 1;
            position: relative;
            background-color: #000000;
        }

        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 密碼保護遮罩 */
        .lock-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .lock-card {
            background-color: #1c1c1e;
            border: 1px solid #2c2c2e;
            padding: 40px 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .lock-card h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #ffffff;
            font-weight: 600;
        }

        .lock-card p {
            color: #8e8e93;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .password-input {
            width: 100%;
            padding: 12px;
            background-color: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .password-input:focus {
            border-color: #8e8e93;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #e5e5e5;
        }

        .error-msg {
            color: #ff453a;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- 頂部導覽分頁 -->
    <header>
        <ul class="nav-tabs">
            <li><button class="tab-btn active" onclick="switchTab(0)">首頁公告</button></li>
            <li><button class="tab-btn" onclick="switchTab(1)">專屬房間</button></li>
            <li><button class="tab-btn" onclick="switchTab(2)">會員專區</button></li>
        </ul>
    </header>

    <!-- 內容展示區 -->
    <div class="content-container">
        
        <!-- 分頁一：第一個網址 -->
        <iframe id="tab-0" class="tab-content active" src="https://jazzy-jalebi-24488f.netlify.app/"></iframe>

        <!-- 分頁二：第二個網址 (設有密碼鎖) -->
        <div id="tab-1-container" class="tab-content" style="position: relative; height: 100%; width: 100%;">
            <!-- 密碼鎖畫面 -->
            <div id="lock-screen" class="lock-screen">
                <div class="lock-card">
                    <h2>🔒 閒人出租會員限定</h2>
                    <p>此頁面僅限會員瀏覽，請輸入專屬密碼解鎖</p>
                    <input type="password" id="pwd-input" class="password-input" placeholder="請輸入 4 位密碼" maxlength="8">
                    <button class="submit-btn" onclick="checkPassword()">確認送出</button>
                    <p id="error-message" class="error-msg">密碼錯誤，請重新輸入！</p>
                </div>
            </div>
            <!-- 實際嵌入的第二個網址 -->
            <iframe id="tab-1" style="width:100%; height:100%; border:none; display:none;" src="https://6a561a77fa80380008fa8372--phenomenal-chaja-07e7cf.netlify.app/"></iframe>
        </div>

        <!-- 分頁三：自訂內容 (可以做為會員規範或公告) -->
        <div id="tab-2" class="tab-content" style="padding: 40px 20px; background-color: #121212; overflow-y: auto; text-align: center;">
            <div style="max-width: 600px; margin: 0 auto;">
                <h1 style="color: #fff; margin-bottom: 20px; font-weight: 500;">閒人出租 會員專區</h1>
                <hr style="border: 0; border-top: 1px solid #2c2c2e; margin-bottom: 30px;">
                <p style="color: #a1a1a6; line-height: 1.8; margin-bottom: 20px; text-align: left;">
                    歡迎來到閒人出租會員專區。在這裡，您可以享受專屬的陪伴預約服務與個人化調整。
                </p>
                <p style="color: #a1a1a6; line-height: 1.8; margin-bottom: 20px; text-align: left;">
                    若您尚未取得專屬密碼，或對服務條款、預約流程有任何疑問，請隨時透過官方社群平台與我們聯繫。
                </p>
                <div style="margin-top: 40px; padding: 20px; background-color: #1c1c1e; border: 1px solid #2c2c2e; border-radius: 8px;">
                    <span style="color: #8e8e93; font-size: 14px;">Xianren Anneisuo © 2026</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        let isUnlocked = false; // 紀錄密碼是否已成功解鎖

        function switchTab(index) {
            // 隱藏所有分頁與按鈕激活狀態
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // 激活點選的按鈕
            document.querySelectorAll('.tab-btn')[index].classList.add('active');

            if (index === 0) {
                document.getElementById('tab-0').classList.add('active');
            } else if (index === 1) {
                document.getElementById('tab-1-container').classList.add('active');
                // 如果已經解鎖過，直接顯示內容並隱藏鎖定畫面
                if (isUnlocked) {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('tab-1').style.display = 'block';
                } else {
                    document.getElementById('lock-screen').style.display = 'flex';
                    document.getElementById('tab-1').style.display = 'none';
                    document.getElementById('pwd-input').focus();
                }
            } else if (index === 2) {
                document.getElementById('tab-2').classList.add('active');
            }
        }

        function checkPassword() {
            const input = document.getElementById('pwd-input').value;
            const errorMsg = document.getElementById('error-message');

            if (input === '0126') {
                isUnlocked = true;
                errorMsg.style.display = 'none';
                
                // 動態淡出鎖定畫面，顯示 iframe 內容
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('tab-1').style.display = 'block';
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('pwd-input').value = '';
                document.getElementById('pwd-input').focus();
            }
        }

        // 支援在密碼輸入框按「Enter」直接送出
        document.getElementById('pwd-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
