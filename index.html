<title>閒人案內所｜傳送門</title>
<style>
* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
}

body {
background: linear-gradient(135deg, #121214 0%, #1a1a24 100%);
color: #ffffff;
min-height: 100vh;
display: flex;
justify-content: center;
align-items: flex-start;
padding: 40px 20px;
overflow-x: hidden;
position: relative;
}

/* 背景微光裝飾 */
body::before {
content: '';
position: absolute;
top: -10%;
left: -10%;
width: 50%;
height: 50%;
background: radial-gradient(circle, rgba(138, 75, 245, 0.15) 0%, transparent 70%);
z-index: 0;
pointer-events: none;
}

body::after {
content: '';
position: absolute;
bottom: -10%;
right: -10%;
width: 50%;
height: 50%;
background: radial-gradient(circle, rgba(235, 94, 40, 0.1) 0%, transparent 70%);
z-index: 0;
pointer-events: none;
}

.container {
width: 100%;
max-width: 480px;
text-align: center;
z-index: 1;
position: relative;
}

/* 標頭區塊 */
.header {
margin-bottom: 35px;
}

.logo-area {
width: 80px;
height: 80px;
background: linear-gradient(135deg, #8a4bf5, #eb5e28);
border-radius: 50%;
margin: 0 auto 15px;
display: flex;
align-items: center;
justify-content: center;
font-size: 36px;
box-shadow: 0 8px 24px rgba(138, 75, 245, 0.3);
}

.title {
font-size: 24px;
font-weight: 700;
letter-spacing: 1px;
margin-bottom: 8px;
background: linear-gradient(to right, #ffffff, #e0e0e0);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.subtitle {
font-size: 14px;
color: #9999a3;
font-weight: 300;
}

/* 分組標題 */
.section-title {
font-size: 13px;
text-transform: uppercase;
letter-spacing: 2px;
color: #6c6c7a;
margin: 25px 0 12px;
text-align: left;
padding-left: 5px;
font-weight: 600;
}

/* 連結列表 */
.links-group {
display: flex;
flex-direction: column;
gap: 14px;
margin-bottom: 10px;
}

/* 萬用按鈕樣式 */
.link-card {
display: flex;
align-items: center;
padding: 16px 20px;
background: rgba(255, 255, 255, 0.04);
border: 1px solid rgba(255, 255, 255, 0.08);
border-radius: 16px;
text-decoration: none;
color: #ffffff;
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
position: relative;
overflow: hidden;
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
}

.link-card:active, .link-card:hover {
background: rgba(255, 255, 255, 0.09);
border-color: rgba(255, 255, 255, 0.2);
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
}

/* 核心按鈕高亮 */
.link-card.primary {
border-color: rgba(138, 75, 245, 0.4);
background: linear-gradient(90deg, rgba(138, 75, 245, 0.1) 0%, rgba(255, 255, 255, 0.03) 100%);
}
.link-card.primary:active, .link-card.primary:hover {
border-color: rgba(138, 75, 245, 0.8);
box-shadow: 0 6px 20px rgba(138, 75, 245, 0.15);
}

.link-icon {
font-size: 22px;
margin-right: 15px;
width: 30px;
text-align: center;
display: flex;
justify-content: center;
align-items: center;
}

.link-content {
text-align: left;
flex-grow: 1;
}

.link-title {
font-size: 16px;
font-weight: 600;
margin-bottom: 2px;
}

.link-desc {
font-size: 12px;
color: #8e8e9c;
}

/* 限出租者標籤 */
.badge {
font-size: 10px;
padding: 3px 8px;
border-radius: 20px;
font-weight: 600;
margin-left: 10px;
text-transform: uppercase;
}
.badge-warning {
background-color: rgba(235, 94, 40, 0.2);
color: #ff8a5c;
border: 1px solid rgba(235, 94, 40, 0.3);
}

/* 專人聯絡雙欄排版 */
.contact-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
margin-top: 5px;
}

.contact-card {
display: flex;
flex-direction: column;
align-items: center;
padding: 18px 10px;
background: rgba(255, 255, 255, 0.03);
border: 1px solid rgba(255, 255, 255, 0.06);
border-radius: 16px;
text-decoration: none;
color: #ffffff;
transition: all 0.2s ease;
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
}

.contact-card:active, .contact-card:hover {
background: rgba(255, 255, 255, 0.08);
border-color: rgba(255, 255, 255, 0.15);
transform: translateY(-2px);
}

.contact-avatar {
width: 46px;
height: 46px;
border-radius: 50%;
background: #2a2a35;
display: flex;
align-items: center;
justify-content: center;
font-size: 20px;
margin-bottom: 10px;
border: 1px solid rgba(255, 255, 255, 0.1);
}

.contact-name {
font-size: 14px;
font-weight: 600;
}

.footer {
margin-top: 50px;
font-size: 11px;
color: #4e4e5a;
letter-spacing: 0.5px;
}
</style>
</head>
