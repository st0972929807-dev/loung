<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 網頁名稱完美設定 -->
    <title>閒人案內所｜官方聯絡傳送門</title>
    
    <!-- 引入 Google Fonts 與 Font Awesome 圖標 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==================== CSS 樣式美化 (Cyber Neon & 港風美學) ==================== */
        :root {
            --bg-dark: #0a0c10;
            --neon-pink: #ff2d55;
            --neon-blue: #00f0ff;
            --neon-purple: #9d4edd;
            --glass-bg: rgba(20, 24, 33, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f5f6f8;
            --text-muted: #8e9cae;
            --gold: #ffb703;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding-bottom: 60px;
        }

        /* 背景流動霓虹光暈 */
        .bg-glow-1 {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(255, 45, 85, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .bg-glow-2 {
            position: fixed;
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.12) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* 主容器 */
        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 30px 15px;
        }

        /* 網頁標頭 */
        .main-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-wrapper {
            width: 85px;
            height: 85px;
            background: radial-gradient(circle, #24142c 0%, #100b16 100%);
            border: 2px solid var(--neon-pink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 0 15px rgba(255, 45, 85, 0.4);
        }

        .ghost-icon {
            font-size: 38px;
            animation: floatGhost 3s ease-in-out infinite;
        }

        @keyframes floatGhost {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .main-header h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--text-primary), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .main-header .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* 分頁導覽列 */
        .tab-navigation {
            display: flex;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 6px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 12px 6px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--neon-pink) 0%, var(--neon-purple) 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 45, 85, 0.3);
        }

        /* 分頁切換基礎 */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 連結區塊樣式 */
        .link-section {
            margin-bottom: 25px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .decorator-line {
            width: 4px;
            height: 18px;
            background: var(--neon-pink);
            border-radius: 2px;
            box-shadow: 0 0 8px var(--neon-pink);
        }

        .section-title h2 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* 傳送門連結卡片 */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(10px);
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255, 45, 85, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .link-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 45, 85, 0.4);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), 0 0 10px rgba(255, 45, 85, 0.1);
        }

        .link-card:hover::before {
            transform: translateX(0);
        }

        .link-card.highlight {
            border-color: rgba(255, 45, 85, 0.3);
            background: linear-gradient(135deg, rgba(20, 24, 33, 0.8) 0%, rgba(35, 20, 30, 0.8) 100%);
        }

        .card-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-box {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--neon-blue);
        }

        .link-card.highlight .icon-box {
            color: var(--neon-pink);
            background: rgba(255, 45, 85, 0.08);
            border-color: rgba(255, 45, 85, 0.2);
        }

        .text-box h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .text-box p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .arrow-icon {
            font-size: 13px;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .link-card:hover .arrow-icon {
            transform: translateX(3px);
            color: var(--text-primary);
        }

        .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--neon-pink);
            color: #fff;
            font-size: 9px;
            font-weight: 900;
            padding: 3px 10px;
            border-bottom-left-radius: 10px;
            letter-spacing: 1px;
        }

        .badge.admin {
            background: var(--neon-purple);
        }

        /* 諮詢區塊 (一對一) */
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .contact-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .contact-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .contact-card.boss:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 8px 20px rgba(0, 240, 255, 0.15);
        }

        .contact-card.admin:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 8px 20px rgba(157, 78, 221, 0.15);
        }

        .contact-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
