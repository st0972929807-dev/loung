<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閒人案內所 ｜ VIP Lounge Portal</title>
    <style>
        /* 基礎樣式 & Cyber Neon 霓虹主題 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid #1f2937;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
            overflow: hidden;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        /* 標題 Header */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            border-bottom: 1px solid #1f2937;
            position: relative;
        }

        .logo-glow {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
            margin-bottom: 8px;
        }

        .header p {
            color: #94a3b8;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* 分頁 Tab 導覽列 */
        .tab-navigation {
            display: flex;
            background: #111827;
            border-bottom: 1px solid #1f2937;
        }

        .tab-btn {
            flex: 1;
            padding: 16px 10px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            border-bottom: 3px solid transparent;
        }

        .tab-btn:hover {
            color: #00f2fe;
            background: rgba(0, 242, 254, 0.05);
        }

        .tab-btn.active {
            color: #00f2fe;
            border-bottom-color: #00f2fe;
            background: rgba(0, 242, 254, 0.08);
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.5);
        }

        /* 內容區塊 */
        .tab-content {
            padding: 30px 20px;
        }

        .tab-panel {
            display: none;
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        .tab-panel.active {
            display: block;
        }

        /* HOTLINE & ROOMS 樣式 */
        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #00f2fe;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #00f2fe;
            padding-left: 10px;
        }

        .hotline-card {
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .hotline-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.15);
            border-color: #00f2fe;
        }

        .hotline-icon {
            font-size: 2rem;
        }

        .hotline-info h3 {
            color: #f1f5f9;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .hotline-info p {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .room-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .room-btn {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            padding: 12px 6px;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s ease;
        }

        .room-btn span {
            font-size: 0.65rem;
            color: #64748b;
            margin-top: 2px;
            font-weight: normal;
        }

        .room-btn:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: #00f2fe;
            color: #00f2fe;
            transform: scale(1.05);
        }

        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 16px 20px;
            color: #f1f5f9;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .chat-btn:hover {
            background: rgba(0, 242, 254, 0.08);
            border-color: #00f2fe;
            color: #00f2fe;
            padding-left: 25px;
        }

        /* 規範 & SOP 樣式 */
        .sop-list, .rule-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sop-item, .rule-item {
            background: #182235;
            border: 1px solid #2d3748;
            border-radius: 10px;
            padding: 20px;
        }

        .sop-num {
            font-weight: 800;
            color: #00f2fe;
            font-size: 1.2rem;
            margin-bottom: 8px;
            display: block;
        }

        .sop-title, .rule-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .sop-content, .rule-content {
            color: #cbd5e1;
            font-size: 0.92rem;
            line-height: 1.6;
        }

        .highlight-red {
            color: #f87171;
            font-weight: bold;
        }

        .highlight-blue {
            color: #38bdf8;
            font-weight: bold;
        }

        .card-inner {
            background: rgba(30, 41, 59, 0.5);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #3b82f6;
            margin-top: 10px;
        }

        /* 頁尾 Footer */
        .footer {
            text-align: center;
            color: #475569;
            font-size: 0.8rem;
            padding: 20px;
        }

        /* 動畫效果 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 手機 RWD 適應 */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .room-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .tab-btn { font-size: 0.85rem; padding: 14px 5px; }
            .tab-content { padding: 20px 15px; }
        }
    </style>
</head>
